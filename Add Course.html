<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> course organizing system</title>
    <link rel="stylesheet" href="master.css">
</head>

<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="My_courses.html">My courses</a>
        <a href="Add Course.html">Add course</a>
        <a href="contact us.html">contact Us</a>
        <div class="logo"><img src="helwn logo.png" alt="Helwan university logo"></div>
    </nav>


    <h1>
        <span class="halweny"> PERSONAL COURSE</span>
        <span class="courses"> ORGANIZER </span>
    </h1>


    <div class="add_course">
        
        <form >
            <h1> Add course</h1>
            
            <div class="course_code">
                <label for="course_code">course code</label>
                <input id="course_code" type="text" required placeholder="course code">
            </div>
            <div class="course_name">
                <label for="course_name">course name</label>
                <input id="course_name" type="text" required placeholder="course name">
            </div>
            <div class="credit_Hours">
                <label for="credit_Hours">credit Hours</label>
                <input id="credit_Hours" type="number" required placeholder="credit Hours">
            </div>
            <div class="doc_name">
                <label for="Instructor's_Name">Instructor's Name</label>
                <input id="Instructor's_Name" type="text" required placeholder="instructor's Name">
            </div>

            
            <div class="buttons-container">
                <button type="submit">Add</button>
                <button type="reset">Reset</button> 
            </div>

        </form>
    </div>




    
    <footer>
        <div class="footer">
            <p>"The beautiful thing about learning is that no one can take it away from you."</p>
            <p> 2026 Personal Course Organizer &copy; - Helwan University.</p>
        </div>
    </footer>
    

</body>


</html>
